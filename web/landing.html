<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SK매직 인증파트너점 분양 플랫폼</title>
<meta name="robots" content="noindex,nofollow">
<link rel="stylesheet" href="./assets/style.css">
<link rel="icon" type="image/png" sizes="32x32" href="./assets/brand/favicon-32.png">
<style>
  body{
    background:linear-gradient(180deg, #fafbfc 0%, #f0f1f5 100%);
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    padding:32px 20px;
    font-family:'Pretendard', system-ui, sans-serif;
  }
  .landing-card{
    background:#fff;
    border-radius:20px;
    padding:48px 40px;
    width:100%; max-width:520px;
    text-align:center;
    box-shadow:0 16px 48px rgba(0,0,0,.06);
  }
  .landing-logo{
    height:36px; width:auto;
    margin:0 auto 8px;
    display:block;
  }
  .landing-eyebrow{
    font-size:11px; font-weight:700;
    color:var(--primary);
    letter-spacing:1.4px; text-transform:uppercase;
    margin-bottom:20px;
  }
  .landing-title{
    font-size:24px; font-weight:800;
    letter-spacing:-0.6px;
    color:var(--ink-1);
    margin:0 0 14px;
    line-height:1.35;
  }
  .landing-desc{
    font-size:14px; color:var(--ink-3);
    line-height:1.7;
    margin:0 0 30px;
  }
  .landing-divider{
    height:1px; background:var(--line);
    margin:28px 0 24px;
  }
  .landing-section-label{
    font-size:11.5px; font-weight:600;
    color:var(--ink-4);
    letter-spacing:0.8px; text-transform:uppercase;
    margin-bottom:12px;
  }
  .landing-cta-row{
    display:flex; gap:10px; justify-content:center;
    flex-wrap:wrap;
  }
  .landing-btn{
    display:inline-flex; align-items:center; gap:6px;
    height:42px; padding:0 22px;
    border-radius:8px;
    font-size:13.5px; font-weight:600;
    text-decoration:none;
    transition:background .12s, border-color .12s;
  }
  .landing-btn-primary{
    background:var(--primary); color:#fff;
    border:1px solid var(--primary);
  }
  .landing-btn-primary:hover{background:var(--primary-dark); border-color:var(--primary-dark)}
  .landing-btn-ghost{
    background:#fff; color:var(--ink-2);
    border:1px solid var(--line-strong);
  }
  .landing-btn-ghost:hover{background:var(--surface)}
  .landing-foot{
    margin-top:32px;
    font-size:11.5px;
    color:var(--ink-4);
    line-height:1.6;
  }
  .landing-foot strong{color:var(--ink-3); font-weight:600}
</style>
</head>
<body>

<div class="landing-card">
  <img class="landing-logo" src="./assets/brand/logo.png" alt="">
  <div class="landing-eyebrow">SK Magic Authorized Partner Platform</div>

  <h1 class="landing-title">매장 직접 주소로 접속해주세요</h1>
  <p class="landing-desc">
    이 페이지는 SK매직 인증파트너점 분양 플랫폼의 진입 페이지예요.<br>
    각 매장은 <strong style="color:var(--ink-1)">고유 주소</strong>를 가지고 있으며,<br>
    매장에서 안내받은 링크로 직접 들어가야 상품과 가격을 보실 수 있습니다.
  </p>

  <div class="landing-divider"></div>

  <div class="landing-foot">
    <strong>매장에 직접 문의:</strong> 안내받으신 매장 주소로 접속해주세요.
  </div>
</div>

</body>
</html>
