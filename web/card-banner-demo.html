<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>제휴카드 배너 데모 (SVG 카드)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{ --container:1200px; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard',-apple-system,sans-serif;background:#f4f5f7;color:#1a1a1a;padding:32px 0}
  .wrap{max-width:var(--container);margin:0 auto;padding:0 20px}
  h1.demo{font-size:18px;margin-bottom:6px}
  p.demo{font-size:13px;color:#888;margin-bottom:20px}
  .label{font-size:13px;font-weight:700;color:#555;margin:26px 0 10px}

  .card-hero{
    position:relative;overflow:hidden;border-radius:18px;height:320px;display:flex;align-items:center;
    background:
      radial-gradient(120% 150% at 86% 22%, var(--glow) 0%, transparent 52%),
      radial-gradient(90% 130% at 8% 95%, var(--glow2) 0%, transparent 60%),
      linear-gradient(115deg, var(--g1) 0%, var(--g2) 100%);
  }
  .card-hero::before{content:'';position:absolute;width:520px;height:520px;border-radius:50%;right:-60px;top:-160px;background:var(--blob);opacity:.5;filter:blur(8px)}
  .ch-inner{position:relative;z-index:2;width:100%;max-width:var(--container);margin:0 auto;padding:0 56px;display:flex;align-items:center;justify-content:space-between;gap:24px}
  .ch-text{color:var(--ink,#33235b)}
  .ch-eyebrow{display:inline-block;font-size:13px;font-weight:700;background:rgba(255,255,255,.55);padding:6px 14px;border-radius:999px;margin-bottom:16px;color:#5b4a8a}
  .ch-text h2{font-size:32px;font-weight:800;line-height:1.32;letter-spacing:-.5px}
  .ch-sub{margin-top:12px;font-size:15px;opacity:.8;font-weight:500}
  .ch-tags{margin-top:22px;display:flex;gap:8px;flex-wrap:wrap}
  .ch-tags span{font-size:12.5px;font-weight:600;color:#5b4a8a;background:rgba(255,255,255,.6);padding:7px 14px;border-radius:999px}

  /* SVG 카드 */
  .ch-card-svg{flex:0 0 auto;width:430px;transform:rotate(-8deg);filter:drop-shadow(0 20px 34px rgba(50,35,80,.3))}
  .ch-card-svg svg{width:100%;height:auto;display:block}
</style>
</head>
<body>
<div class="wrap">
  <h1 class="demo">제휴카드 배너 — SVG 카드 시안</h1>
  <p class="demo">카드를 SVG로 직접 그림(텍스트 안 깨짐, 색 자유). 디자인 보고 조정해줘.</p>

  <div class="label">A. 파스텔 퍼플 + 실버 카드</div>
  <div class="card-hero" style="--g1:#ece6f8;--g2:#f6ebf3;--glow:rgba(255,190,225,.65);--glow2:rgba(190,195,250,.4);--blob:#e7d5f3;--ink:#3a2b63">
    <div class="ch-inner">
      <div class="ch-text">
        <span class="ch-eyebrow">SK매직 X SK인텔릭스 카드</span>
        <h2>SK인텔릭스 제휴카드로<br>월 렌탈료 최대 2.5만원 할인</h2>
        <p class="ch-sub">8개 카드사 · 전월실적별 청구 할인</p>
        <div class="ch-tags"><span># 월 구독료 할인</span><span># 무이자 할부</span><span># 청구 할인</span></div>
      </div>
      <div class="ch-card-svg">
        <svg viewBox="0 0 400 252" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SK인텔릭스 제휴 신용카드">
          <defs>
            <linearGradient id="cg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#f6f6f9"/>
              <stop offset=".48" stop-color="#dadae1"/>
              <stop offset="1" stop-color="#bcbcc6"/>
            </linearGradient>
            <linearGradient id="gloss" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#ffffff" stop-opacity=".55"/>
              <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
            </linearGradient>
            <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#ecd089"/>
              <stop offset="1" stop-color="#b8902f"/>
            </linearGradient>
          </defs>
          <!-- 카드 본체 -->
          <rect x="2" y="2" width="396" height="248" rx="22" fill="url(#cg)" stroke="#ffffff" stroke-opacity=".5"/>
          <!-- 사선 광택 -->
          <path d="M2 24 L210 2 L398 60 L398 150 L120 250 L2 250 Z" fill="url(#gloss)"/>
          <!-- 칩 -->
          <rect x="38" y="98" width="54" height="42" rx="8" fill="url(#chip)"/>
          <path d="M65 98 v42 M38 112 h54 M38 126 h54" stroke="#9a7820" stroke-width="1.6" stroke-opacity=".55"/>
          <!-- 브랜드 -->
          <text x="38" y="62" font-family="Pretendard,sans-serif" font-size="26" font-weight="800" fill="#3b3b42">SK<tspan font-weight="600" fill="#86868f"> intellix</tspan></text>
          <!-- 카드번호 -->
          <text x="38" y="186" font-family="Pretendard,sans-serif" font-size="20" font-weight="600" letter-spacing="3" fill="#5c5c64">0000  0000  0000  0000</text>
          <!-- 하단 -->
          <text x="38" y="224" font-family="Pretendard,sans-serif" font-size="14" font-weight="700" letter-spacing="1" fill="#7c7c85">skintellix</text>
          <text x="362" y="226" text-anchor="end" font-family="Pretendard,sans-serif" font-size="14" font-weight="800" fill="#7c7c85">SK<tspan font-weight="600"> magic</tspan></text>
        </svg>
      </div>
    </div>
  </div>
</div>
</body>
</html>
